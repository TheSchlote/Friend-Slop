name: Build Windows and Deploy to itch.io

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

env:
  UNITY_PROJECT_PATH: Space Game
  UNITY_VERSION: 6000.3.4f1
  BUILD_TARGET: StandaloneWindows64
  BUILD_NAME: FriendSlop
  BUILD_VERSION: 0.1.${{ github.run_number }}
  ITCH_USER: theschlote
  ITCH_GAME: ${{ vars.ITCH_GAME != '' && vars.ITCH_GAME || 'friend-slop' }}

jobs:
  editmode-tests:
    name: Run EditMode tests
    runs-on: ubuntu-22.04

    steps:
      - name: Check Unity license secrets
        shell: bash
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if [[ -z "$UNITY_EMAIL" || -z "$UNITY_PASSWORD" ]]; then
            echo "::error::Set UNITY_EMAIL and UNITY_PASSWORD in GitHub Actions secrets."
            exit 1
          fi

          if [[ -z "$UNITY_LICENSE" && -z "$UNITY_SERIAL" ]]; then
            echo "::error::Set UNITY_LICENSE for a Personal license, or UNITY_SERIAL for a Pro/Plus license."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-FriendSlop-${{ runner.os }}-EditMode-${{ hashFiles('Space Game/Packages/manifest.json', 'Space Game/Packages/packages-lock.json', 'Space Game/ProjectSettings/**', 'Space Game/Assets/**') }}
          restore-keys: |
            Library-FriendSlop-${{ runner.os }}-EditMode-
            Library-FriendSlop-${{ runner.os }}-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: EditMode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EditMode test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: FriendSlop-EditMode-Test-Results-${{ github.run_number }}
          path: test-results
          if-no-files-found: warn
          retention-days: 14

  playmode-tests:
    name: Run PlayMode smoke tests
    runs-on: ubuntu-22.04
    needs: editmode-tests

    steps:
      - name: Check Unity license secrets
        shell: bash
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if [[ -z "$UNITY_EMAIL" || -z "$UNITY_PASSWORD" ]]; then
            echo "::error::Set UNITY_EMAIL and UNITY_PASSWORD in GitHub Actions secrets."
            exit 1
          fi

          if [[ -z "$UNITY_LICENSE" && -z "$UNITY_SERIAL" ]]; then
            echo "::error::Set UNITY_LICENSE for a Personal license, or UNITY_SERIAL for a Pro/Plus license."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-FriendSlop-${{ runner.os }}-PlayMode-${{ hashFiles('Space Game/Packages/manifest.json', 'Space Game/Packages/packages-lock.json', 'Space Game/ProjectSettings/**', 'Space Game/Assets/**') }}
          restore-keys: |
            Library-FriendSlop-${{ runner.os }}-PlayMode-
            Library-FriendSlop-${{ runner.os }}-

      - name: Run PlayMode smoke tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: PlayMode
          artifactsPath: playmode-test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          useHostNetwork: true

      - name: Upload PlayMode test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: FriendSlop-PlayMode-Test-Results-${{ github.run_number }}
          path: playmode-test-results
          if-no-files-found: warn
          retention-days: 14

  build-windows:
    name: Build Windows player
    runs-on: ubuntu-22.04
    needs:
      - editmode-tests
      - playmode-tests
    outputs:
      build-version: ${{ steps.unity-build.outputs.buildVersion }}

    steps:
      - name: Check Unity license secrets
        shell: bash
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
        run: |
          if [[ -z "$UNITY_EMAIL" || -z "$UNITY_PASSWORD" ]]; then
            echo "::error::Set UNITY_EMAIL and UNITY_PASSWORD in GitHub Actions secrets."
            exit 1
          fi

          if [[ -z "$UNITY_LICENSE" && -z "$UNITY_SERIAL" ]]; then
            echo "::error::Set UNITY_LICENSE for a Personal license, or UNITY_SERIAL for a Pro/Plus license."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-FriendSlop-${{ runner.os }}-${{ env.BUILD_TARGET }}-${{ hashFiles('Space Game/Packages/manifest.json', 'Space Game/Packages/packages-lock.json', 'Space Game/ProjectSettings/**', 'Space Game/Assets/**') }}
          restore-keys: |
            Library-FriendSlop-${{ runner.os }}-${{ env.BUILD_TARGET }}-
            Library-FriendSlop-${{ runner.os }}-

      - name: Build Windows player
        id: unity-build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: ${{ env.BUILD_TARGET }}
          buildName: ${{ env.BUILD_NAME }}
          buildsPath: build
          versioning: Custom
          version: ${{ env.BUILD_VERSION }}

      - name: Fix build output ownership
        shell: bash
        run: sudo chown -R "$(id -u):$(id -g)" build

      - name: Write playtest notes
        shell: bash
        run: |
          notes_path="build/${BUILD_TARGET}/PLAYTEST_NOTES.txt"
          mkdir -p "$(dirname "$notes_path")"
          {
            echo "Friend Slop Retrieval ${BUILD_VERSION}"
            echo "Commit: ${GITHUB_SHA}"
            echo "Build: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Recent changes:"
            git log -5 --pretty=format:'- %s (%h)'
            echo
          } > "$notes_path"

          {
            echo "### Friend Slop Retrieval ${BUILD_VERSION}"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Build: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo
            echo "Recent changes:"
            git log -5 --pretty=format:'- %s (%h)'
            echo
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload Windows build artifact
        uses: actions/upload-artifact@v7
        with:
          name: FriendSlop-Windows-${{ github.run_number }}
          path: build/${{ env.BUILD_TARGET }}
          if-no-files-found: error
          retention-days: 14

  deploy-itch:
    name: Deploy Windows build to itch.io
    runs-on: ubuntu-22.04
    needs: build-windows
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    environment:
      name: itch-production
      url: https://theschlote.itch.io/friend-slop
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      BUTLER_API_KEY_PRESENT: ${{ secrets.BUTLER_API_KEY != '' }}

    steps:
      - name: Skip deploy when butler is not configured
        if: env.BUTLER_API_KEY_PRESENT != 'true'
        run: |
          echo "BUTLER_API_KEY is not set, so the itch.io deploy step was skipped."
          echo "The Windows build artifact is still available on this workflow run."

      - name: Download Windows build artifact
        if: env.BUTLER_API_KEY_PRESENT == 'true'
        uses: actions/download-artifact@v8
        with:
          name: FriendSlop-Windows-${{ github.run_number }}
          path: build/${{ env.BUILD_TARGET }}

      - name: Install butler
        if: env.BUTLER_API_KEY_PRESENT == 'true'
        shell: bash
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip -d butler
          chmod +x butler/butler
          ./butler/butler version

      - name: Push build to itch.io
        if: env.BUTLER_API_KEY_PRESENT == 'true'
        shell: bash
        run: |
          user_version="${{ needs.build-windows.outputs.build-version }}"
          if [[ -z "$user_version" ]]; then
            user_version="${GITHUB_SHA::7}"
          fi

          ./butler/butler push "build/${BUILD_TARGET}" "${ITCH_USER}/${ITCH_GAME}:windows" --userversion "$user_version"
