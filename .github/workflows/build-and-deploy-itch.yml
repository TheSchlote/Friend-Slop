name: Build Windows and Deploy to itch.io

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  merge_group:
  workflow_dispatch:

permissions:
  contents: read
  checks: write

concurrency:
  group: friend-slop-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  UNITY_PROJECT_PATH: Space Game
  UNITY_VERSION: 6000.3.4f1
  BUILD_NAME: FriendSlop
  BUILD_VERSION: 0.1.${{ github.run_number }}
  # GameCI v4 actions still declare Node 20 as of this workflow revision.
  # Keep this until GameCI ships Node 24 action metadata, then remove it.
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ITCH_USER: theschlote
  ITCH_GAME: ${{ vars.ITCH_GAME != '' && vars.ITCH_GAME || 'friend-slop' }}

jobs:
  validate-unity-version:
    name: Validate Unity version
    runs-on: ubuntu-22.04
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Verify workflow Unity version matches project
        shell: pwsh
        run: ./tools/Assert-UnityVersion.ps1 -ExpectedUnityVersion '${{ env.UNITY_VERSION }}'

  editmode-tests:
    name: Run EditMode tests
    runs-on: ubuntu-22.04
    needs: validate-unity-version
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Check Unity license secrets
        uses: ./.github/actions/check-unity-license
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-FriendSlop-${{ runner.os }}-EditMode-${{ hashFiles('Space Game/Packages/manifest.json', 'Space Game/Packages/packages-lock.json', 'Space Game/ProjectSettings/**', 'Space Game/Assets/**') }}
          restore-keys: |
            Library-FriendSlop-${{ runner.os }}-EditMode-
            Library-FriendSlop-${{ runner.os }}-

      - name: Run EditMode tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: EditMode
          artifactsPath: test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload EditMode test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: FriendSlop-EditMode-Test-Results-${{ github.run_number }}
          path: test-results
          if-no-files-found: warn
          retention-days: 14

  playmode-tests:
    name: Run PlayMode smoke tests
    runs-on: ubuntu-22.04
    needs: validate-unity-version
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Check Unity license secrets
        uses: ./.github/actions/check-unity-license
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-FriendSlop-${{ runner.os }}-PlayMode-${{ hashFiles('Space Game/Packages/manifest.json', 'Space Game/Packages/packages-lock.json', 'Space Game/ProjectSettings/**', 'Space Game/Assets/**') }}
          restore-keys: |
            Library-FriendSlop-${{ runner.os }}-PlayMode-
            Library-FriendSlop-${{ runner.os }}-

      - name: Run PlayMode smoke tests
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: PlayMode
          artifactsPath: playmode-test-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}
          useHostNetwork: true

      - name: Upload PlayMode test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: FriendSlop-PlayMode-Test-Results-${{ github.run_number }}
          path: playmode-test-results
          if-no-files-found: warn
          retention-days: 14

  validate-scenes:
    name: Validate planet scenes
    runs-on: ubuntu-22.04
    needs: validate-unity-version
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Check Unity license secrets
        uses: ./.github/actions/check-unity-license
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-FriendSlop-${{ runner.os }}-SceneValidation-${{ hashFiles('Space Game/Packages/manifest.json', 'Space Game/Packages/packages-lock.json', 'Space Game/ProjectSettings/**', 'Space Game/Assets/**') }}
          restore-keys: |
            Library-FriendSlop-${{ runner.os }}-SceneValidation-
            Library-FriendSlop-${{ runner.os }}-

      - name: Run planet scene validator
        uses: game-ci/unity-test-runner@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          testMode: EditMode
          testFilter: FriendSlop.Tests.EditMode.PlanetSceneValidatorTests
          artifactsPath: scene-validation-results
          githubToken: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload planet scene validation results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: FriendSlop-Scene-Validation-Results-${{ github.run_number }}
          path: scene-validation-results
          if-no-files-found: warn
          retention-days: 14

  build-player:
    name: Build ${{ matrix.label }} player
    runs-on: ubuntu-22.04
    needs:
      - editmode-tests
      - playmode-tests
      - validate-scenes
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneWindows64
            itchChannel: windows
            label: Windows
          - targetPlatform: StandaloneLinux64
            itchChannel: linux
            label: Linux
          - targetPlatform: StandaloneOSX
            itchChannel: mac
            label: macOS

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          lfs: true

      - name: Check Unity license secrets
        uses: ./.github/actions/check-unity-license
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}

      - name: Cache Unity Library
        uses: actions/cache@v5
        with:
          path: ${{ env.UNITY_PROJECT_PATH }}/Library
          key: Library-FriendSlop-${{ runner.os }}-${{ matrix.targetPlatform }}-${{ hashFiles('Space Game/Packages/manifest.json', 'Space Game/Packages/packages-lock.json', 'Space Game/ProjectSettings/**', 'Space Game/Assets/**') }}
          restore-keys: |
            Library-FriendSlop-${{ runner.os }}-${{ matrix.targetPlatform }}-
            Library-FriendSlop-${{ runner.os }}-

      - name: Build ${{ matrix.label }} player
        id: unity-build
        uses: game-ci/unity-builder@v4
        env:
          UNITY_LICENSE: ${{ secrets.UNITY_LICENSE }}
          UNITY_EMAIL: ${{ secrets.UNITY_EMAIL }}
          UNITY_PASSWORD: ${{ secrets.UNITY_PASSWORD }}
          UNITY_SERIAL: ${{ secrets.UNITY_SERIAL }}
        with:
          projectPath: ${{ env.UNITY_PROJECT_PATH }}
          unityVersion: ${{ env.UNITY_VERSION }}
          targetPlatform: ${{ matrix.targetPlatform }}
          buildName: ${{ env.BUILD_NAME }}
          buildsPath: build
          versioning: Custom
          version: ${{ env.BUILD_VERSION }}

      - name: Fix build output ownership
        shell: bash
        run: sudo chown -R "$(id -u):$(id -g)" "build/${TARGET_PLATFORM}"
        env:
          TARGET_PLATFORM: ${{ matrix.targetPlatform }}

      - name: Write playtest notes
        shell: bash
        env:
          TARGET_PLATFORM: ${{ matrix.targetPlatform }}
          ITCH_CHANNEL: ${{ matrix.itchChannel }}
          PLATFORM_LABEL: ${{ matrix.label }}
        run: |
          output_dir="build/${TARGET_PLATFORM}"
          notes_path="${output_dir}/PLAYTEST_NOTES.txt"
          release_notes_path="${output_dir}/RELEASE_NOTES.md"
          mkdir -p "$output_dir"

          {
            echo "# Friend Slop Retrieval ${BUILD_VERSION} (${PLATFORM_LABEL})"
            echo
            echo "- Commit: \`${GITHUB_SHA}\`"
            echo "- Build: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "- Itch channel: ${ITCH_USER}/${ITCH_GAME}:${ITCH_CHANNEL}"
            echo
            if [[ -f RELEASE_NOTES.md ]]; then
              echo "## Curated Release Notes"
              echo
              sed -n '1,160p' RELEASE_NOTES.md
              echo
            fi
            echo "## Recent Commits"
            echo
            git log -5 --pretty=format:'- %s (%h)'
            echo
          } > "$release_notes_path"

          {
            echo "Friend Slop Retrieval ${BUILD_VERSION} (${PLATFORM_LABEL})"
            echo "Commit: ${GITHUB_SHA}"
            echo "Build: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}"
            echo "Itch channel: ${ITCH_USER}/${ITCH_GAME}:${ITCH_CHANNEL}"
            echo
            if [[ -f RELEASE_NOTES.md ]]; then
              echo "Curated release notes:"
              sed -n '1,160p' RELEASE_NOTES.md
              echo
            fi
            echo "Recent changes:"
            git log -5 --pretty=format:'- %s (%h)'
            echo
          } > "$notes_path"

          cat "$release_notes_path" >> "$GITHUB_STEP_SUMMARY"

      - name: Upload ${{ matrix.label }} build artifact
        uses: actions/upload-artifact@v7
        with:
          name: FriendSlop-${{ matrix.itchChannel }}-${{ github.run_number }}
          path: build/${{ matrix.targetPlatform }}
          if-no-files-found: error
          retention-days: 14

  deploy-itch:
    name: Deploy ${{ matrix.label }} build to itch.io
    runs-on: ubuntu-22.04
    needs: build-player
    if: github.ref == 'refs/heads/main' && (github.event_name == 'push' || github.event_name == 'workflow_dispatch')
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        include:
          - targetPlatform: StandaloneWindows64
            itchChannel: windows
            label: Windows
          - targetPlatform: StandaloneLinux64
            itchChannel: linux
            label: Linux
          - targetPlatform: StandaloneOSX
            itchChannel: mac
            label: macOS
    environment:
      name: itch-production
      url: https://theschlote.itch.io/friend-slop
    env:
      BUTLER_API_KEY: ${{ secrets.BUTLER_API_KEY }}
      BUTLER_API_KEY_PRESENT: ${{ secrets.BUTLER_API_KEY != '' }}

    steps:
      - name: Skip deploy when butler is not configured
        if: env.BUTLER_API_KEY_PRESENT != 'true'
        run: |
          echo "BUTLER_API_KEY is not set, so the itch.io deploy step was skipped."
          echo "The ${PLATFORM_LABEL} build artifact is still available on this workflow run."
          {
            echo "### itch.io deploy skipped"
            echo
            echo "BUTLER_API_KEY is not configured. The ${PLATFORM_LABEL} build artifact is still available on this run."
          } >> "$GITHUB_STEP_SUMMARY"
        env:
          PLATFORM_LABEL: ${{ matrix.label }}

      - name: Download ${{ matrix.label }} build artifact
        if: env.BUTLER_API_KEY_PRESENT == 'true'
        uses: actions/download-artifact@v8
        with:
          name: FriendSlop-${{ matrix.itchChannel }}-${{ github.run_number }}
          path: build/${{ matrix.targetPlatform }}

      - name: Install butler
        if: env.BUTLER_API_KEY_PRESENT == 'true'
        shell: bash
        run: |
          curl -L -o butler.zip https://broth.itch.zone/butler/linux-amd64/LATEST/archive/default
          unzip -q butler.zip -d butler
          chmod +x butler/butler
          ./butler/butler version

      - name: Push build to itch.io
        if: env.BUTLER_API_KEY_PRESENT == 'true'
        shell: bash
        env:
          TARGET_PLATFORM: ${{ matrix.targetPlatform }}
          ITCH_CHANNEL: ${{ matrix.itchChannel }}
        run: |
          user_version="${BUILD_VERSION}"

          ./butler/butler push "build/${TARGET_PLATFORM}" "${ITCH_USER}/${ITCH_GAME}:${ITCH_CHANNEL}" --userversion "$user_version"
          {
            echo "### Deployed to itch.io"
            echo
            echo "- Page: https://${ITCH_USER}.itch.io/${ITCH_GAME}"
            echo "- Channel: ${ITCH_USER}/${ITCH_GAME}:${ITCH_CHANNEL}"
            echo "- Version: ${user_version}"
          } >> "$GITHUB_STEP_SUMMARY"
